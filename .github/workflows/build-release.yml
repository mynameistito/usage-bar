name: Build Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: windows-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc

    env:
      LEFTHOOK: 0
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag || github.event.release.tag_name }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}
          save-always: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Upload installers to release
        shell: bash
        run: |
          if ! compgen -G "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe" > /dev/null || \
             ! compgen -G "src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi" > /dev/null; then
            echo "Error: Missing required installer files"
            exit 1
          fi
          gh release upload ${{ inputs.tag || github.event.release.tag_name }} \
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe \
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
