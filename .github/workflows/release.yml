name: Release

on:
  push:
    branches: [main]

# Only one release job runs at a time per branch.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: windows-latest
    permissions:
      contents: write       # create releases and push tags
      pull-requests: write  # create / update the version PR
    env:
      LEFTHOOK: 0           # disable git hooks in CI
      CARGO_INCREMENTAL: "0"
      # changesets/action writes .netrc under HOME, which is not set on
      # windows-latest in this workflow context.
      HOME: ${{ runner.temp }}

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          # Full history is required so changeset can diff against the base.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; commits made by the action will
          # not re-trigger CI (expected behaviour for version bump commits).
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.88.0
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: src-tauri
          key: release-windows
          save-always: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # When changeset files are present on main the action opens (or updates)
      # a "Version Packages" PR. When that PR is merged, it runs the publish
      # command below. The release script builds all installers before creating
      # the GitHub Release, which keeps it compatible with immutable releases.
      - name: Create version PR or publish release
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        with:
          version: bun run version
          publish: bun run release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
