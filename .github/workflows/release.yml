name: Release

on:
  push:
    branches: [main]

# Only one release job runs at a time per branch.
concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push tags, check existing releases
      pull-requests: write  # create / update the version PR
    env:
      LEFTHOOK: 0           # disable git hooks in CI (pre-commit runs cargo:precheck which needs Linux GTK libs)
    outputs:
      should_publish: ${{ steps.prepare-release.outputs.should_publish }}
      tag: ${{ steps.prepare-release.outputs.tag }}

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          # Full history is required so changeset can diff against the base.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; commits made by the action will
          # not re-trigger CI (expected behaviour for version bump commits).
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # When changeset files are present on main the action opens (or updates)
      # a "Version Packages" PR.  When that PR is merged the changeset files
      # are gone and `hasChangesets` becomes false — that is the signal to cut
      # a release in the next step.
      - name: Create version PR
        id: changesets
        uses: changesets/action@3841a0683d3cfa6dae0f9bb335290003010fe3f0 # v1.9.0
        with:
          version: bun run version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Runs only after the version PR is merged (no more pending changesets).
      # Creates/reuses the tag, but does not publish the GitHub Release yet.
      - name: Prepare release tag
        id: prepare-release
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: bun run prepare-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.arch }})
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: windows-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc

    env:
      LEFTHOOK: 0
      CARGO_INCREMENTAL: "0"

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}
          save-always: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun run tauri build --target ${{ matrix.target }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: installers-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

  publish:
    name: Publish release
    needs: [prepare, build]
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LEFTHOOK: 0

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download installer artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: installers-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        run: bun run release -- dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
